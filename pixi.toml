[project]
name = "chaos-1b"
version = "0.1.0"
description = "Automated Red Teaming via Asynchronous RFT on Apple Silicon"
authors = ["Julian Quick <quectojoules@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[tasks]
# Bootstrapping: Fine-tunes the 1B model on seed attacks so it knows how to behave
bootstrap = "python bootstrap.py"

# The Main Loop: Runs the Generation -> Evaluation -> Learning cycle
start = "python chaos_loop.py"

# Utility: Clean up cache/memory if things get weird
clean = "rm -rf adapters/*.safetensors"
clean-victim = "rm -rf victim_adapters/*.safetensors"
clean-all = "rm -rf adapters/*.safetensors victim_adapters/*.safetensors"
gauntlet = "python gauntlet.py"
plot = "python plot_metrics.py"

[dependencies]
python = "3.11.*"
huggingface_hub = "<1.0"
protobuf = "*"

[pypi-dependencies]
# MLX-LM is the critical dependency for M1 inference/training
mlx-lm = ">=0.19.0,<0.30.0"
transformers = "<5.0"
matplotlib = "*"
seaborn = "*"
