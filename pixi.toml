[project]
name = "redkween"
version = "0.1.0"
description = "Automated Red Teaming via Asynchronous RFT on NVIDIA GPUs"
authors = ["Julian Quick <quectojoules@gmail.com>"]
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
# Bootstrapping: Fine-tunes the 1B model on seed attacks so it knows how to behave
bootstrap = "python bootstrap.py"

# The Main Loop: Runs the Generation -> Evaluation -> Learning cycle
start = "python redkween_loop.py"

# Utility: Clean up cache/memory if things get weird
clean = "rm -rf adapters/"
clean-victim = "rm -rf victim_adapters/"
clean-all = "rm -rf adapters/ victim_adapters/ checkpoints/"
screen = "python baselines.py --screen"
baselines = "python baselines.py"
gauntlet = "python gauntlet.py"
plot = "python plot_metrics.py"

# DPO victim hardening variant
start-dpo = "python redkween_loop.py --victim-dpo"

# A-parameter sweep
sweep = "python sweep.py"
sweep-dry = "python sweep.py --dry-run"

# Strong baselines (GCG, AutoDAN, PAIR)
strong-baselines = "python run_baselines.py"

# Extended evaluation
eval-diversity = "python eval_extended.py --diversity"
eval-safety = "python eval_extended.py --safety"
eval-transfer = "python eval_extended.py --transfer"

# Sweep visualization
plot-sweep = "python plot_sweep.py"

# SAE mechanistic analysis
sae = "python sae_analysis.py all --experiment-dir experiments/frozen_victim_v2"
sae-collect = "python sae_analysis.py collect --experiment-dir experiments/frozen_victim_v2"
sae-train = "python sae_analysis.py train --output-dir results/sae/frozen_victim_v2"
sae-analyze = "python sae_analysis.py analyze --output-dir results/sae/frozen_victim_v2"

[dependencies]
python = "3.11.*"

[pypi-dependencies]
torch = {version = ">=2.2", extras = ["cu124"]}
transformers = ">=4.40"
peft = ">=0.10"
bitsandbytes = ">=0.43"
accelerate = ">=0.30"
matplotlib = "*"
seaborn = "*"
nanogcg = ">=0.1"
scikit-learn = "*"
vastai = ">=0.2.8, <0.3"
