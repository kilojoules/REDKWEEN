site_name: "Chaos: Automated Red Teaming"
site_description: "Automated red-teaming pipeline: adversary models learn to jailbreak larger victim models via LoRA fine-tuning"
repo_url: https://github.com/kilojoules/REDKWEEN
repo_name: kilojoules/REDKWEEN

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: deep orange
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Original Experiment: original-experiment.md
  - Victim Screening: screening.md
  - Chaos Loop Results: results.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
