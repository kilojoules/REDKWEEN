site_name: "REDKWEEN"
site_description: "Adversarial self-play for LLM red-teaming: a 1B adversary learns to jailbreak an 8B victim, defense always wins, and mechanistic probes reveal why"
repo_url: https://github.com/kilojoules/REDKWEEN
repo_name: kilojoules/REDKWEEN

theme:
  name: material
  palette:
    scheme: slate
    primary: red
    accent: deep orange
  features:
    - content.code.copy
    - navigation.sections

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Original Experiment: original-experiment.md
  - Victim Screening: screening.md
  - REDKWEEN Loop Results: results.md
  - Stealth Injection: stealth.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
